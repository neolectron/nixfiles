name: "Check"
on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - name: Add niri binary cache
        run: |
          nix settings --add substituters https://niri.cachix.org
          nix settings --add trusted-public-keys niri.cachix.org-1:Wv0OmO7PsuocRKzfDoJ3mulSl7Z6oezYhGhR+3W2964=
      - name: Check flake evaluates
        run: nix flake check --no-build
      - name: Build NixOS configuration
        run: nix build .#nixosConfigurations.frostbit.config.system.build.toplevel